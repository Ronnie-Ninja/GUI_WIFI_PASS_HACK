<!DOCTYPE html>
<html>
<head>
    <title>RONNIE WIFI PRO</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        .box { border: 2px solid #0f0; padding: 20px; max-width: 500px; margin: auto; box-shadow: 0 0 20px #030; }
        button { background: #0f0; color: #000; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        select, input { width: 100%; padding: 12px; background: #111; color: #0f0; border: 1px solid #0f0; margin-bottom: 15px; box-sizing: border-box; }
        #log { background: #050505; border: 1px dashed #0f0; height: 150px; overflow-y: auto; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>[ RONNIE WIFI PRO ]</h1>
        <button onclick="scanWifi()">1. SCAN NETWORKS</button>
        <select id="ssids"><option>Please scan first...</option></select>
        <input type="text" id="pass" placeholder="Enter Password to Test/Capture">
        <button id="atkBtn" onclick="startAttack()" style="background: #f00; color: #fff;">2. CONNECT / CAPTURE</button>
        <div id="log">Status: Ready</div>
    </div>

    <script>
        async function scanWifi() {
            const res = await fetch('/scan');
            const data = await res.json();
            const list = document.getElementById('ssids');
            list.innerHTML = data.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        async function startAttack() {
            const ssid = document.getElementById('ssids').value;
            const password = document.getElementById('pass').value;
            const log = document.getElementById('log');

            log.innerHTML += `<div>[*] Attempting: ${password}</div>`;

            const res = await fetch('/api/brute', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ssid: ssid, password: password})
            });

            if (res.status === 302) {
                log.innerHTML += `<div style="color:lime">[+] SUCCESS! Connected to ${ssid}</div>`;
                alert("FOUND PASSWORD: " + password);
            } else {
                log.innerHTML += `<div style="color:red">[-] FAILED: ${password}</div>`;
            }
        }
    </script>
</body>
</html>
